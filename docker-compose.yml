services:
  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    container_name: medieval-backend
    ports:
      - "12001:12001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:./dev.db
    volumes:
      - backend-uploads:/app/uploads
      - backend-db:/app/prisma
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:12001/api/config"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
    container_name: medieval-frontend
    ports:
      - "12000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://backend:12001/api
    depends_on:
      backend:
        condition: service_healthy
    restart: always

volumes:
  backend-uploads:
  backend-db:
